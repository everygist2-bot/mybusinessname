<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Name Generator | Creative Business Name Ideas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 900px;
            width: 100%;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .generator-card {
            background: #f9fafb;
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .name-display {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 2px dashed #e5e7eb;
            transition: all 0.2s;
        }

        .company-name {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1f2937;
            letter-spacing: -0.02em;
            word-break: break-word;
        }

        @media (max-width: 640px) {
            .company-name {
                font-size: 1.75rem;
            }
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.125rem;
            font-weight: 600;
            border-radius: 3rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 1rem;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .secondary-btn {
            flex: 1;
            background: white;
            border: 2px solid #e5e7eb;
            padding: 0.75rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            color: #4b5563;
        }

        .secondary-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: #fef9ff;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }

        .industry-selector {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .industry-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
            border: 2px solid #e5e7eb;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            color: #4b5563;
        }

        .industry-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: white;
        }

        .industry-btn:hover:not(.active) {
            border-color: #667eea;
            color: #667eea;
        }

        .saved-names {
            background: #f9fafb;
            border-radius: 1rem;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .saved-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: white;
            margin-bottom: 0.5rem;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
        }

        .saved-name-text {
            font-weight: 500;
            color: #1f2937;
        }

        .remove-saved {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0 0.5rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        .remove-saved:hover {
            background: #fee2e2;
        }

        .empty-saved {
            text-align: center;
            color: #9ca3af;
            padding: 1rem;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
        }

        .clear-btn:hover {
            background: #fee2e2;
        }

        .domain-check {
            margin-top: 1rem;
            padding: 0.75rem;
            background: #f3f4f6;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            text-align: center;
        }

        .domain-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .domain-link:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #9ca3af;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 Company Name Generator</h1>
        <div class="subtitle">Generate creative, unique business names instantly</div>

        <div class="generator-card">
            <div class="name-display">
                <div class="company-name" id="companyName">VelocityForge Labs</div>
            </div>
            <button class="generate-btn" id="generateBtn">✨ Generate New Name</button>
            <div class="action-buttons">
                <button class="secondary-btn" id="saveBtn">💾 Save This Name</button>
                <button class="secondary-btn" id="copyBtn">📋 Copy to Clipboard</button>
            </div>
            
            <div class="domain-check" id="domainCheck">
                <a href="#" id="domainLink" class="domain-link" target="_blank">Check domain availability on Namecheap</a>
            </div>
        </div>

        <div class="section-title">🎯 Select Industry</div>
        <div class="industry-selector" id="industrySelector">
            <button data-industry="tech" class="industry-btn active">Tech / SaaS</button>
            <button data-industry="finance" class="industry-btn">Finance / Crypto</button>
            <button data-industry="creative" class="industry-btn">Creative / Media</button>
            <button data-industry="health" class="industry-btn">Health / Wellness</button>
            <button data-industry="green" class="industry-btn">Green / Sustainability</button>
            <button data-industry="food" class="industry-btn">Food / Beverage</button>
        </div>

        <div class="section-title">⭐ Saved Names <button class="clear-btn" id="clearSavedBtn">Clear all</button></div>
        <div class="saved-names" id="savedNamesList">
            <div class="empty-saved">No saved names yet. Click "Save" on a name you like!</div>
        </div>
        <footer>
            💡 Tip: Mix and match — generate multiple names and save your favorites!
        </footer>
    </div>

    <script>
        // Industry-specific word banks
        const wordBanks = {
            tech: {
                prefixes: ['Smart', 'NextGen', 'Digital', 'Cloud', 'Data', 'Code', 'Cyber', 'Neural', 'Quantum', 'Agile'],
                roots: ['Tech', 'Soft', 'Ware', 'Logic', 'Sys', 'Byte', 'Pixel', 'Stack', 'Dev', 'Compute'],
                suffixes: ['Labs', 'Studio', 'Solutions', 'Systems', 'AI', 'Innovations', 'Digital', 'Hub', 'Works', 'HQ']
            },
            finance: {
                prefixes: ['Secure', 'Global', 'Capital', 'Wealth', 'Prime', 'Apex', 'Trust', 'Equity', 'Nexus', 'Fiscal'],
                roots: ['Finance', 'Ledger', 'Asset', 'Capital', 'Vault', 'Coin', 'Trade', 'Holdings', 'Reserve', 'Market'],
                suffixes: ['Group', 'Partners', 'Capital', 'Advisory', 'Trust', 'Bank', 'Wealth', 'Ventures', 'Fund', 'Exchange']
            },
            creative: {
                prefixes: ['Bold', 'Bright', 'Pure', 'Wild', 'Blank', 'Fresh', 'Radical', 'Studio', 'Art', 'Vivid'],
                roots: ['Media', 'Creative', 'Story', 'Design', 'Pixel', 'Canvas', 'Frame', 'Muse', 'Spark', 'Idea'],
                suffixes: ['Studio', 'Collective', 'Agency', 'House', 'Lab', 'Workshop', 'Creative', 'Co', 'Atelier', 'Press']
            },
            health: {
                prefixes: ['Vital', 'Pure', 'Active', 'Well', 'Mindful', 'Holistic', 'Revive', 'Zen', 'Core', 'Balance'],
                roots: ['Health', 'Wellness', 'Life', 'Care', 'Vitality', 'Therapy', 'Med', 'Fit', 'Nurture', 'Thrive'],
                suffixes: ['Clinic', 'Wellness', 'Health', 'Center', 'Care', 'Institute', 'Life', 'Solutions', 'MD', 'Therapeutics']
            },
            green: {
                prefixes: ['Eco', 'Green', 'Pure', 'Solar', 'Earth', 'Native', 'Sustainable', 'Clean', 'Renew', 'Forest'],
                roots: ['Energy', 'Earth', 'Green', 'Eco', 'Cycle', 'Garden', 'Planet', 'Nature', 'Verdant', 'Terra'],
                suffixes: ['Solutions', 'Energy', 'Collective', 'Earth', 'Green', 'Eco', 'Labs', 'Initiative', 'Power', 'Sustain']
            },
            food: {
                prefixes: ['Fresh', 'Pure', 'Local', 'Harvest', 'Spice', 'Golden', 'Rustic', 'Taste', 'Artisan', 'Kitchen'],
                roots: ['Food', 'Flavor', 'Brew', 'Grain', 'Table', 'Plate', 'Spoon', 'Bite', 'Harvest', 'Pantry'],
                suffixes: ['Kitchen', 'Co', 'Eatery', 'Bakery', 'Brewery', 'Provisions', 'Table', 'Goods', 'Cafe', 'Deli']
            }
        };

        // Current state
        let currentIndustry = 'tech';
        let currentName = 'VelocityForge Labs';
        let savedNames = loadSavedNames();

        // DOM elements
        const companyNameEl = document.getElementById('companyName');
        const generateBtn = document.getElementById('generateBtn');
        const saveBtn = document.getElementById('saveBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearSavedBtn = document.getElementById('clearSavedBtn');
        const savedNamesList = document.getElementById('savedNamesList');
        const domainLink = document.getElementById('domainLink');
        const industryBtns = document.querySelectorAll('.industry-btn');

        // Helper: Load saved names from localStorage
        function loadSavedNames() {
            const saved = localStorage.getItem('companyNames_saved');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch(e) {
                    return [];
                }
            }
            return [];
        }

        // Helper: Save to localStorage
        function persistSavedNames() {
            localStorage.setItem('companyNames_saved', JSON.stringify(savedNames));
        }

        // Generate a random name based on current industry
        function generateName() {
            const bank = wordBanks[currentIndustry];
            
            // 30% chance to use prefix+root, 30% root+suffix, 30% prefix+suffix, 10% single word
            const rand = Math.random();
            let name = '';
            
            if (rand < 0.3) {
                // Prefix + Root
                const prefix = bank.prefixes[Math.floor(Math.random() * bank.prefixes.length)];
                const root = bank.roots[Math.floor(Math.random() * bank.roots.length)];
                name = prefix + root;
            } else if (rand < 0.6) {
                // Root + Suffix
                const root = bank.roots[Math.floor(Math.random() * bank.roots.length)];
                const suffix = bank.suffixes[Math.floor(Math.random() * bank.suffixes.length)];
                name = root + ' ' + suffix;
            } else if (rand < 0.9) {
                // Prefix + Suffix
                const prefix = bank.prefixes[Math.floor(Math.random() * bank.prefixes.length)];
                const suffix = bank.suffixes[Math.floor(Math.random() * bank.suffixes.length)];
                name = prefix + ' ' + suffix;
            } else {
                // Single word from roots
                name = bank.roots[Math.floor(Math.random() * bank.roots.length)];
            }
            
            // Occasionally add "The " prefix for style
            if (Math.random() < 0.15 && !name.startsWith('The ')) {
                name = 'The ' + name;
            }
            
            return name;
        }

        // Update displayed name
        function updateNameDisplay() {
            companyNameEl.textContent = currentName;
            // Update domain check link
            const domainQuery = encodeURIComponent(currentName.toLowerCase().replace(/\s+/g, '') + '.com');
            domainLink.href = `https://www.namecheap.com/domains/registration/results/?query=${domainQuery}`;
        }

        // Generate and set new random name
        function generateAndSetNewName() {
            currentName = generateName();
            updateNameDisplay();
        }

        // Save current name
        function saveCurrentName() {
            if (savedNames.includes(currentName)) {
                showTemporaryMessage('⚠️ Name already saved!', '#f59e0b');
                return;
            }
            savedNames.unshift(currentName); // Add to beginning
            if (savedNames.length > 20) savedNames.pop(); // Keep max 20
            persistSavedNames();
            renderSavedNames();
            showTemporaryMessage('✓ Name saved!', '#10b981');
        }

        // Show temporary feedback
        function showTemporaryMessage(message, color) {
            const originalText = generateBtn.textContent;
            const originalBg = generateBtn.style.background;
            generateBtn.textContent = message;
            generateBtn.style.background = color;
            setTimeout(() => {
                generateBtn.textContent = originalText;
                generateBtn.style.background = originalBg;
            }, 1500);
        }

        // Copy current name to clipboard
        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(currentName);
                showTemporaryMessage('📋 Copied!', '#10b981');
            } catch (err) {
                showTemporaryMessage('❌ Copy failed', '#ef4444');
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = currentName;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showTemporaryMessage('📋 Copied!', '#10b981');
            }
        }

        // Render saved names list
        function renderSavedNames() {
            if (savedNames.length === 0) {
                savedNamesList.innerHTML = '<div class="empty-saved">No saved names yet. Click "Save" on a name you like!</div>';
                return;
            }
            
            savedNamesList.innerHTML = '';
            savedNames.forEach((name, index) => {
                const div = document.createElement('div');
                div.className = 'saved-item';
                div.innerHTML = `
                    <span class="saved-name-text">${escapeHtml(name)}</span>
                    <button class="remove-saved" data-name="${escapeHtml(name)}" data-index="${index}">✕</button>
                `;
                savedNamesList.appendChild(div);
            });
            
            // Add remove listeners
            document.querySelectorAll('.remove-saved').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const nameToRemove = btn.getAttribute('data-name');
                    removeSavedName(nameToRemove);
                });
            });
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function removeSavedName(nameToRemove) {
            savedNames = savedNames.filter(n => n !== nameToRemove);
            persistSavedNames();
            renderSavedNames();
            showTemporaryMessage('🗑️ Removed', '#ef4444');
        }

        function clearAllSaved() {
            if (savedNames.length > 0 && confirm('Remove all saved names?')) {
                savedNames = [];
                persistSavedNames();
                renderSavedNames();
                showTemporaryMessage('All saved names cleared', '#f59e0b');
            }
        }

        // Switch industry
        function setIndustry(industry) {
            currentIndustry = industry;
            // Update UI active state
            industryBtns.forEach(btn => {
                if (btn.getAttribute('data-industry') === industry) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            // Generate a fresh name for the new industry
            generateAndSetNewName();
        }

        // Event listeners
        generateBtn.addEventListener('click', generateAndSetNewName);
        saveBtn.addEventListener('click', saveCurrentName);
        copyBtn.addEventListener('click', copyToClipboard);
        clearSavedBtn.addEventListener('click', clearAllSaved);
        
        industryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const industry = btn.getAttribute('data-industry');
                setIndustry(industry);
            });
        });
        
        // Initial render
        renderSavedNames();
        generateAndSetNewName();
    </script>
</body>
</html>
